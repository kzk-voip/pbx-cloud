version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    network_mode: host
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    network_mode: host
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    network_mode: host
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  # --- EXPORTERS ---

  redis-exporter:
    image: oliver006/redis_exporter
    network_mode: host
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_ADDR=redis://127.0.0.1:6379
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    network_mode: host
    environment:
      - DATA_SOURCE_NAME=postgresql://pbx_user:${POSTGRES_PASSWORD}@127.0.0.1:5432/pbx?sslmode=disable
    restart: unless-stopped

  # Kamailio exporter
  # kamailio-exporter:
  #   image: florentchauveau/kamailio_exporter:latest # Trying an alternative or disable if unavailable
  #   network_mode: host
  #   command: ["-kamailio.scrape-uri", "http://127.0.0.1:9090"]
  #   restart: unless-stopped


volumes:
  prometheus_data:
  grafana_data:
