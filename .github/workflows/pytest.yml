name: API Tests

on:
  push:
    branches: [dev, main, "feature/*"]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pbx_user
          POSTGRES_PASSWORD: pbx_pass
          POSTGRES_DB: pbx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://pbx_user:pbx_pass@localhost:5432/pbx
          DATABASE_TEST_URL: postgresql+asyncpg://pbx_user:pbx_pass@localhost:5432/pbx
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
        run: |
          cd api
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
