# fail2ban filter for Kamailio SIP flood / auth failures
# Matches Kamailio log lines for:
# - Pike flood detection
# - Unknown tenant domain (REGISTER probing)
# - User-tenant mismatch (cross-tenant attack)

[Definition]
failregex = ^.*Pike flood detected from <HOST>.*$
            ^.*REGISTER rejected: unknown domain.*from <HOST>.*$
            ^.*REGISTER rejected: user .* does not belong to tenant.*from <HOST>.*$
            ^.*Blocked blacklisted IP: <HOST>.*$

ignoreregex =
