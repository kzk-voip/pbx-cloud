services:
  kamailio:
    build: ./kamailio
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASTERISK_IP=127.0.0.1
      - ASTERISK_PORT=5070
      - EXTERNAL_IP=${EXTERNAL_IP}
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg
    restart: unless-stopped

  asterisk:
    build: ./asterisk
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - EXTERNAL_IP=${EXTERNAL_IP}
    volumes:
      - ./asterisk/etc/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/etc/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./asterisk/etc/asterisk/extconfig.conf:/etc/asterisk/extconfig.conf
      - ./asterisk/etc/asterisk/res_pgsql.conf:/etc/asterisk/res_pgsql.conf
      - ./asterisk/etc/asterisk/sorcery.conf:/etc/asterisk/sorcery.conf
      - ./asterisk/etc/asterisk/voicemail.conf:/etc/asterisk/voicemail.conf
      - ./asterisk/etc/asterisk/features.conf:/etc/asterisk/features.conf
      - ./asterisk/etc/asterisk/musiconhold.conf:/etc/asterisk/musiconhold.conf
      - ./asterisk/etc/asterisk/cdr_pgsql.conf:/etc/asterisk/cdr_pgsql.conf
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pbx
      POSTGRES_USER: pbx_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./asterisk/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbx_user -d pbx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://pbx_user:${POSTGRES_PASSWORD}@127.0.0.1:5432/pbx
      - REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - AMI_HOST=127.0.0.1
      - AMI_PORT=5038
      - AMI_USERNAME=${AMI_USERNAME:-admin}
      - AMI_PASSWORD=${AMI_PASSWORD:-changeme}
    volumes:
      - ./api:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
