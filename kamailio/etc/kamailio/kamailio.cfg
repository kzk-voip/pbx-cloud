#!KAMAILIO
#
# kamailio.cfg — Multi-tenant SIP proxy for PBX Cloud
#
# Responsibilities:
#   1. Accept SIP REGISTER/INVITE from clients
#   2. Determine tenant from Request-URI domain
#   3. Add X-Tenant-ID header
#   4. Forward to Asterisk backend(s)
#   5. Prevent routing loops (don't re-process Asterisk responses)
#

####### Global Parameters #########

debug=3
log_stderror=yes
log_facility=LOG_LOCAL0

fork=yes
children=4

# Listen on all interfaces, UDP only for now
listen=udp:0.0.0.0:5060
# Disable TCP for simplicity (enable later if needed)
# listen=tcp:0.0.0.0:5060

# Infrastructure aliases (always local)
alias="kamailio"
alias="localhost"

# Tenant domain aliases (generated from PostgreSQL by docker-entrypoint.sh)
#!include_file "/etc/kamailio/tenant_aliases.cfg"

auto_aliases=no
dns=no
rev_dns=no

# SIP message size limits
maxbuffer=65536

####### Modules Section ########

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "dispatcher.so"
loadmodule "htable.so"
loadmodule "nathelper.so"

####### Module Parameters ########

# -- Transaction Module --
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# -- Record-Route Module --
# Add ;lr parameter for loose routing
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# -- Dispatcher Module --
# Asterisk backends, read from dispatcher.list
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "force_dst", 1)
# Round-robin algorithm (0=hash over callid, 4=round-robin, 8=hash over from-uri)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "ds_inactive_threshold", 3)
# 0 = do not automatically ping, assume active until proven otherwise
modparam("dispatcher", "ds_probing_mode", 0)

# -- Htable Module --
# Tenant domain → tenant_id mapping (populated at startup)
# Format: key=domain, value=tenant_id
modparam("htable", "htable", "tenants=>size=4;initval=0;")

####### Routing Logic ########

# --- Startup Event: populate tenant htable ---
# Entries are generated from PostgreSQL by docker-entrypoint.sh
event_route[htable:mod-init] {
#!include_file "/etc/kamailio/tenant_htable.cfg"
    xlog("L_INFO", "Tenant htable initialized from database\n");
}

# ============================
# Main Request Route
# ============================
request_route {
    # Force symmetric routing for NAT/Docker MASQUERADE
    force_rport();

    # --- Max forwards check (loop prevention layer 1) ---
    if (!maxfwd_process("10")) {
        xlog("L_WARN", "Too many hops: $rm from $fu (Max-Forwards exceeded)\n");
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # --- Sanity checks ---
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # --- Record-Route for in-dialog requests ---
    # Only for INVITE (not REGISTER) — ensures BYE/ACK traverse Kamailio
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # --- Handle sequential/in-dialog requests (ACK, BYE, re-INVITE) ---
    if (has_totag()) {
        if (loose_route()) {
            # In-dialog request following Route headers — forward it
            xlog("L_INFO", "In-dialog $rm from $fu to $tu (via loose route)\n");

            if (is_method("ACK")) {
                # ACK is hop-by-hop in loose routing
                route(RELAY);
                exit;
            }

            # BYE, re-INVITE, etc.
            route(RELAY);
            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                # ACK for a locally handled transaction (e.g., 487 after CANCEL)
                route(RELAY);
                exit;
            }
            # ACK without matching transaction — drop silently
            xlog("L_WARN", "ACK without matching transaction from $si:$sp\n");
            exit;
        }

        # Sequential request without Route header — bad
        sl_send_reply("404", "Not Here");
        exit;
    }

    # ============================
    # Initial requests (no to-tag)
    # ============================

    # --- CANCEL handling ---
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # --- Retransmission detection ---
    t_check_trans();

    # ==================================
    # LOOP PREVENTION: detect requests FROM Asterisk
    # ==================================
    # ds_is_from_list(1) checks if source IP:port matches any destination
    # in dispatcher set 1 (our Asterisk backends). This is the canonical
    # way to detect backend-originated traffic — works correctly with
    # Docker bridge networking where IPs are dynamic.
    if (ds_is_from_list("1")) {
        # OPTIONS keepalive from Asterisk: reply locally
        if (is_method("OPTIONS")) {
            xlog("L_DBG", "OPTIONS from Asterisk ($si:$sp) — replying 200 OK\n");
            sl_send_reply("200", "OK");
            exit;
        }

        xlog("L_INFO", "Request from Asterisk ($si:$sp): $rm $ru — relaying outbound\n");
        # For now, outbound trunk routing is not implemented (Epic 2.3+)
        # Just relay toward the destination URI
        route(RELAY);
        exit;
    }

    # ==================================
    # REGISTER handling
    # ==================================
    if (is_method("REGISTER")) {
        # Force the Contact header to be the public NAT IP/Port, so Asterisk can route back
        fix_nated_register();

        # Determine tenant from Request-URI domain
        route(TENANT_LOOKUP);

        if ($var(tenant_id) == 0) {
            xlog("L_WARN", "REGISTER for unknown domain: $rd from $si:$sp\n");
            sl_send_reply("403", "Unknown Domain");
            exit;
        }

        # Add tenant header for Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $var(tenant_id)\r\n");

        # Strip preloaded Route headers (e.g., from MicroSIP Outbound Proxy)
        # Without this, Asterisk bounces the request back to Kamailio, causing a loop.
        remove_hf("Route");

        xlog("L_INFO", "REGISTER from $fu domain=$rd tenant=$var(tenant_id) — dispatching to Asterisk\n");

        # Dispatch to Asterisk
        route(DISPATCH);
        exit;
    }

    # ==================================
    # INVITE handling
    # ==================================
    if (is_method("INVITE")) {
        # Determine tenant from Request-URI domain
        route(TENANT_LOOKUP);

        if ($var(tenant_id) == 0) {
            xlog("L_WARN", "INVITE for unknown domain: $rd from $fu\n");
            sl_send_reply("403", "Unknown Domain");
            exit;
        }

        # --- Defense-in-depth: Cross-tenant check ---
        # From-URI domain must match To-URI domain for intra-tenant calls
        $var(from_domain) = $fd;
        $var(to_domain) = $rd;
        $var(from_tenant) = $sht(tenants=>$var(from_domain));
        $var(to_tenant) = $sht(tenants=>$var(to_domain));

        if ($var(from_tenant) != 0 && $var(to_tenant) != 0) {
            if ($var(from_tenant) != $var(to_tenant)) {
                xlog("L_WARN", "Cross-tenant INVITE blocked: from=$fu (tenant=$var(from_tenant)) to=$tu (tenant=$var(to_tenant))\n");
                sl_send_reply("403", "Cross-Tenant Calls Forbidden");
                exit;
            }
        }

        # Add tenant header for Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $var(tenant_id)\r\n");

        # Strip preloaded Route headers (e.g., from MicroSIP Outbound Proxy)
        # Without this, Asterisk bounces the request back to Kamailio, causing a loop.
        remove_hf("Route");

        xlog("L_INFO", "INVITE from $fu to $tu tenant=$var(tenant_id) — dispatching to Asterisk\n");

        route(DISPATCH);
        exit;
    }

    # --- All other methods: relay if destined for known domain ---
    if (is_method("NOTIFY|REFER|MESSAGE|INFO|UPDATE")) {
        route(DISPATCH);
        exit;
    }

    # --- Unknown method ---
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

# ============================
# TENANT_LOOKUP: Extract tenant ID from Request-URI domain
# ============================
route[TENANT_LOOKUP] {
    # Get the domain from the Request-URI
    $var(domain) = $rd;

    # Look up in htable
    $var(tenant_id) = $sht(tenants=>$var(domain));

    if ($var(tenant_id) == $null || $var(tenant_id) == 0) {
        $var(tenant_id) = 0;
        xlog("L_DBG", "TENANT_LOOKUP: domain=$var(domain) — NOT FOUND\n");
    } else {
        xlog("L_DBG", "TENANT_LOOKUP: domain=$var(domain) → tenant=$var(tenant_id)\n");
    }
}

# ============================
# DISPATCH: Send to Asterisk via dispatcher
# ============================
route[DISPATCH] {
    # Dispatcher set 1 = Asterisk backends
    # Algorithm 0 = hash over Call-ID (sticky routing for in-dialog requests)
    if (!ds_select_dst("1", "0")) {
        xlog("L_ERR", "DISPATCH: No available Asterisk backends!\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    xlog("L_INFO", "DISPATCH: $rm $ru → $du\n");

    route(RELAY);
}

# ============================
# RELAY: Forward the request via transaction module
# ============================
route[RELAY] {
    if (is_method("INVITE")) {
        # Set failure route for INVITE
        t_on_failure("MANAGE_FAILURE");
    }

    if (!t_relay()) {
        xlog("L_ERR", "RELAY failed: $rm from $fu to $du\n");
        sl_reply_error();
    }
    exit;
}

# ============================
# Reply route: handle responses
# ============================
onreply_route {
    xlog("L_DBG", "Reply: $rs $rr for $rm (CSeq: $cs)\n");

}

# ============================
# Failure route: handle failed INVITEs
# ============================
failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    xlog("L_WARN", "MANAGE_FAILURE: INVITE to $du failed with $rs $rr\n");

    # Could try next Asterisk backend here if multiple exist
    # if (ds_next_dst()) {
    #     t_on_failure("MANAGE_FAILURE");
    #     route(RELAY);
    #     exit;
    # }
}
