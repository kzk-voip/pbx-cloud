#!KAMAILIO
#
# Kamailio Multi-Tenant SIP Proxy for PBX Cloud
# Routes SIP traffic to Asterisk with X-Tenant-ID header
#
# Call flow:
#   Client -> Kamailio:5060 (auth+tenant) -> Asterisk:5080 (dialplan)
#   Asterisk:5080 -> Kamailio:5060 (usrloc lookup) -> Client
#

####### Global Parameters #######

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
fork=yes
children=4
auto_aliases=no
listen=udp:0.0.0.0:5060
port=5060

####### Modules Section #######

loadmodule "kex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "nathelper.so"
loadmodule "dispatcher.so"
loadmodule "db_postgres.so"
loadmodule "sqlops.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "auth.so"
loadmodule "auth_db.so"

####### Module Parameters #######

# -- rr params --
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# -- tm params --
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# -- dispatcher params --
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "force_dst", 1)

# -- usrloc params --
# Memory-only mode: contacts stored in RAM, Asterisk also has its own registration
modparam("usrloc", "db_mode", 0)

# -- auth_db params --
modparam("auth_db", "db_url", "postgres://pbx_user:POSTGRES_PASSWORD_PLACEHOLDER@127.0.0.1:5432/pbx")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "use_domain", 0)

# -- sqlops params --
modparam("sqlops", "sqlcon", "cb=>postgres://pbx_user:POSTGRES_PASSWORD_PLACEHOLDER@127.0.0.1:5432/pbx")

####### Routing Logic #######

request_route {
    # Per-request initial checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP request from $si:$sp\n");
        exit;
    }

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record-Route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle requests within existing dialogs
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE within dialog from $fU\n");
            }
            route(RELAY);
            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                route(RELAY);
                exit;
            }
            exit;
        }

        sl_send_reply("404", "Not Found");
        exit;
    }

    # --- REGISTER handling ---
    if (is_method("REGISTER")) {
        route(AUTH);
        route(TENANT_LOOKUP);

        # Save registration in Kamailio usrloc (memory)
        # so we can route INVITEs from Asterisk back to clients
        save("location");

        # Forward REGISTER to Asterisk (so Asterisk also registers the endpoint)
        remove_hf("Route");
        append_hf("X-Tenant-ID: $var(tenant_id)\r\n");

        if (!ds_select_dst("1", "0")) {
            sl_send_reply("502", "No Asterisk Available");
            exit;
        }

        t_on_reply("REGISTER_REPLY");
        t_relay();
        exit;
    }

    # --- INVITE from Asterisk (source port 5080) ---
    # Asterisk sends INVITE back to Kamailio to reach the actual SIP client
    if (is_method("INVITE") && $sp == 5080) {
        xlog("L_INFO", "INVITE from Asterisk for $rU - looking up in usrloc\n");

        # Look up the destination in usrloc
        if (!lookup("location")) {
            xlog("L_WARN", "INVITE from Asterisk: $rU not found in usrloc\n");
            sl_send_reply("404", "User Not Found");
            exit;
        }

        xlog("L_INFO", "INVITE from Asterisk: routing $rU to $du\n");
        route(RELAY);
        exit;
    }

    # --- INVITE from SIP client ---
    if (is_method("INVITE")) {
        route(AUTH);
        route(TENANT_LOOKUP);

        # Add X-Tenant-ID header
        append_hf("X-Tenant-ID: $var(tenant_id)\r\n");

        # Forward to Asterisk via dispatcher
        if (!ds_select_dst("1", "0")) {
            sl_send_reply("502", "No Asterisk Available");
            exit;
        }

        t_on_failure("INVITE_FAILURE");
        route(RELAY);
        exit;
    }

    # All other requests - relay if we can
    route(RELAY);
}

# --- Authentication route ---
route[AUTH] {
    if (!is_method("REGISTER|INVITE")) {
        return;
    }

    # Challenge the request (realm = "pbx")
    if (!www_authorize("pbx", "ps_auths")) {
        www_challenge("pbx", "1");
        exit;
    }

    # Check credentials match the From header
    if ($au != $fU) {
        xlog("L_WARN", "AUTH: Username mismatch au=$au fU=$fU\n");
        sl_send_reply("403", "Forbidden - User Mismatch");
        exit;
    }

    consume_credentials();
}

# --- Tenant lookup route ---
route[TENANT_LOOKUP] {
    # Extract tenant_id from username prefix (format: t1_101 -> t1)
    $var(tenant_id) = $(au{s.select,0,_});

    if ($var(tenant_id) == $null || $var(tenant_id) == "") {
        xlog("L_WARN", "TENANT: No tenant prefix found in username $au\n");
        sl_send_reply("403", "Forbidden - Invalid Tenant");
        exit;
    }

    # Verify tenant exists and is active
    sql_query("cb",
        "SELECT id FROM tenants WHERE id='$var(tenant_id)' AND active=true",
        "ra");

    if ($dbr(ra=>rows) == 0) {
        xlog("L_WARN", "TENANT: Unknown or inactive tenant $var(tenant_id)\n");
        sl_send_reply("403", "Forbidden - Unknown Tenant");
        exit;
    }

    xlog("L_INFO", "TENANT: Resolved tenant=$var(tenant_id) for user=$au\n");
}

# --- Relay route ---
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# --- Reply handling for REGISTER ---
onreply_route[REGISTER_REPLY] {
    xlog("L_INFO", "REGISTER reply $rs from Asterisk for $fU\n");
}

# --- Failure handling for INVITE ---
failure_route[INVITE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    xlog("L_INFO", "INVITE failure $rs for $rU\n");
}
