#!KAMAILIO
#
# Multi-tenant PBX — Kamailio SIP Proxy Configuration
# =====================================================
# Kamailio acts as the SIP edge proxy:
#   1. Receives REGISTER/INVITE from SIP clients
#   2. Resolves tenant by SIP domain (To/Request-URI)
#   3. Rewrites user part: 101 → t1_101 (prepend tenant prefix)
#   4. Adds X-Tenant-ID header
#   5. Forwards to Asterisk
#

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0

fork=yes
children=4

auto_aliases=no
dns=no
rev_dns=no

listen=udp:0.0.0.0:5060

####### Modules Section ########

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "nathelper.so"
loadmodule "path.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "textopsx.so"

# ----- tm params -----
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 30000)

# ----- rr params -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# ----- nathelper params -----
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# ----- pike params (rate limiting) -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# ----- htable: tenant domain → prefix/id mapping -----
# Format: domain => prefix::tenant_id
modparam("htable", "htable", "tenants=>size=4;initval=0;")

####### Routing Logic ########

event_route[htable:mod-init] {
    # Populate tenant mapping table on startup
    # Key: SIP domain, Value: prefix::tenant_id
    $sht(tenants=>tenant1.pbx.local) = "t1::1";
    $sht(tenants=>tenant2.pbx.local) = "t2::2";

    xlog("L_INFO", "Tenant htable initialized\n");
}

# Main SIP request routing logic
request_route {

    # --- Max-Forwards check ---
    if (!maxfwd_process("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # --- Sanity check ---
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # --- Rate limiting (pike) ---
    if (!pike_check_req()) {
        xlog("L_WARN", "PIKE: Rate limit exceeded for $si\n");
        sl_send_reply("503", "Service Unavailable - Rate Limited");
        exit;
    }

    # --- Record-Route for mid-dialog requests ---
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # --- Handle sequential (in-dialog) requests ---
    if (has_totag()) {
        if (loose_route()) {
            # In-dialog request — forward along the route
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE received for $ci\n");
            }
            t_relay();
            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                t_relay();
                exit;
            }
            exit;
        }

        sl_send_reply("404", "Not Found");
        exit;
    }

    # === Initial requests (no to-tag) ===

    # --- CANCEL processing ---
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # --- OPTIONS keepalive ---
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # --- REGISTER handling ---
    if (is_method("REGISTER")) {
        route(TENANT_RESOLVE);

        if ($avp(tenant_prefix) == $null) {
            sl_send_reply("403", "Unknown Domain");
            exit;
        }

        route(REWRITE_USER);
        route(RELAY_TO_ASTERISK);
        exit;
    }

    # --- INVITE handling ---
    if (is_method("INVITE")) {
        route(TENANT_RESOLVE);

        if ($avp(tenant_prefix) == $null) {
            sl_send_reply("403", "Unknown Domain");
            exit;
        }

        route(REWRITE_USER);
        route(RELAY_TO_ASTERISK);
        exit;
    }

    # --- All other methods: relay if tenant resolves ---
    route(TENANT_RESOLVE);
    if ($avp(tenant_prefix) != $null) {
        route(REWRITE_USER);
        route(RELAY_TO_ASTERISK);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}

# -------------------------------------------------------
# Route: TENANT_RESOLVE
# Extracts domain from URI and looks up tenant in htable
# Sets: $avp(tenant_prefix), $avp(tenant_id)
# -------------------------------------------------------
route[TENANT_RESOLVE] {
    # For REGISTER, use the To-URI domain
    # For INVITE and others, use the Request-URI domain
    if (is_method("REGISTER")) {
        $var(domain) = $td;  # To-URI domain
    } else {
        $var(domain) = $rd;  # Request-URI domain
    }

    xlog("L_INFO", "TENANT_RESOLVE: domain=$var(domain)\n");

    # Lookup in htable
    if ($sht(tenants=>$var(domain)) != $null && $sht(tenants=>$var(domain)) != 0) {
        # Parse "prefix::tenant_id" format
        $var(mapping) = $sht(tenants=>$var(domain));
        $avp(tenant_prefix) = $(var(mapping){s.select,0,::});
        $avp(tenant_id) = $(var(mapping){s.select,1,::});

        xlog("L_INFO", "TENANT_RESOLVE: prefix=$avp(tenant_prefix), id=$avp(tenant_id)\n");
    } else {
        xlog("L_WARN", "TENANT_RESOLVE: Unknown domain: $var(domain)\n");
        $avp(tenant_prefix) = $null;
    }
}

# -------------------------------------------------------
# Route: REWRITE_USER
# Rewrites the Request-URI user from ext → {prefix}_{ext}
# Also adds X-Tenant-ID header
# -------------------------------------------------------
route[REWRITE_USER] {
    # Get the original user part
    if (is_method("REGISTER")) {
        $var(orig_user) = $tU;  # To-URI user for REGISTER
    } else {
        $var(orig_user) = $rU;  # Request-URI user
    }

    # Build new user: t1_101
    $var(new_user) = $avp(tenant_prefix) + "_" + $var(orig_user);

    xlog("L_INFO", "REWRITE_USER: $var(orig_user) → $var(new_user)\n");

    # Rewrite Request-URI user
    $rU = $var(new_user);

    # Also rewrite To-URI user for REGISTER (Asterisk matches by AOR)
    if (is_method("REGISTER")) {
        $tU = $var(new_user);
    }

    # Remove any existing X-Tenant-ID header (security: prevent spoofing)
    remove_hf("X-Tenant-ID");

    # Add X-Tenant-ID header
    append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");
}

# -------------------------------------------------------
# Route: RELAY_TO_ASTERISK
# Forwards the SIP request to Asterisk via stateful proxy
# -------------------------------------------------------
route[RELAY_TO_ASTERISK] {
    # Set destination to Asterisk container
    $du = "sip:asterisk:5060";

    xlog("L_INFO", "RELAY: Forwarding to Asterisk ($du), method=$rm, ruri=$ru\n");

    # NAT handling: force rport
    force_rport();

    if (is_method("REGISTER")) {
        # Add Path header for registration (so Asterisk knows how to reach the client)
        add_path_received();
    }

    if (!t_relay()) {
        sl_reply_error();
    }
}

# -------------------------------------------------------
# Reply routing
# -------------------------------------------------------
onreply_route {
    # NAT handling for replies
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}

# -------------------------------------------------------
# Failure routing
# -------------------------------------------------------
failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }
}
