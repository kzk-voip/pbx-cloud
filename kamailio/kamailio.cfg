#!KAMAILIO
#
# PBX Cloud - Multi-Tenant SIP Proxy Configuration
# Kamailio 5.7 - Edge proxy with tenant routing
#

####### Global Parameters #########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0

memdbg=5
memlog=5

children=4
auto_aliases=no
enable_tls=yes

# Listen on UDP port 5060 (edge SIP port)
listen=udp:0.0.0.0:5060 advertise ${EXTERNAL_IP}:5060

# Listen on TLS port 5061 (SIP over TLS)
listen=tls:0.0.0.0:5061 advertise ${EXTERNAL_IP}:5061

####### Modules Section ########

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "usrloc.so"
loadmodule "nathelper.so"
loadmodule "htable.so"
loadmodule "path.so"
loadmodule "pike.so"
loadmodule "textopsx.so"
loadmodule "jsonrpcs.so"
loadmodule "tls.so"
loadmodule "dispatcher.so"

# ---- Module Parameters ----

# Transaction module
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# Record-Route
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# NAT helper — Kamailio is stateless proxy, no NAT keepalive needed
# (Asterisk handles registrations and keepalive via qualify_frequency)
modparam("nathelper", "received_avp", "$avp(received)")

# usrloc — memory-only mode (Asterisk handles registrations, not Kamailio)
modparam("usrloc", "db_mode", 0)

# Pike — flood protection
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# TLS — SIP over TLS on port 5061 (self-signed cert)
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# htable — tenant domain lookup table
# Format: key = SIP domain, value = tenant slug
# Populated on startup via event_route[htable:mod-init] and dynamically via JSONRPC
modparam("htable", "htable", "tenants=>size=4;")

# htable — IP blacklist (auto-expire after 3600 seconds = 1 hour)
# Pike-detected flood sources are added here automatically
modparam("htable", "htable", "ipblacklist=>size=8;autoexpire=3600;initval=0;")

# JSONRPC — DATAGRAM (UDP) transport for API management
# Per docs: 1=HTTP, 2=FIFO, 4=DATAGRAM, 8=TCP
modparam("jsonrpcs", "transport", 4)
modparam("jsonrpcs", "dgram_socket", "udp:127.0.0.1:9090")

# Dispatcher — Asterisk pool load balancing (Phase 5)
# File-based destination list; algorithm 10 = hash by Call-ID (sticky sessions)
# OPTIONS health check every 5s; 2 failures = mark inactive; auto re-probe
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "dst_avp", "$avp(ds_dst)")
modparam("dispatcher", "grp_avp", "$avp(ds_grp)")
modparam("dispatcher", "cnt_avp", "$avp(ds_cnt)")
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_from", "sip:proxy@pbx.local")
modparam("dispatcher", "ds_probing_threshold", 2)

####### Routing Logic ########

# Main request route
request_route {

    # ---- Pike flood protection + IP blacklist ----
    route(PIKE_CHECK);

    # ---- Per-request initial checks ----
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Sanity check
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # ---- Anti-loop: detect requests from Asterisk nodes ----
    # If the request comes from an Asterisk node, let it through
    # without re-processing tenant logic. Asterisk B2BUA sends NEW INVITEs
    # with Route headers (from Path) — loose_route() processes them.
    # Check both Asterisk ports (5070 for node1, 5072 for node2).
    if (($sp == 5070 || $sp == 5072) && ($si == "127.0.0.1" || $si == "${EXTERNAL_IP}")) {
        xlog("L_INFO", "Request from Asterisk [$si:$sp] [$rm $ru] — forwarding outbound\n");
        if (is_method("INVITE|SUBSCRIBE")) {
            record_route();
        }
        # Process Route headers (from Path-based routing)
        if (loose_route()) {
            xlog("L_INFO", "Asterisk outbound via loose_route to $du\n");
            route(RELAY);
            exit;
        }
        route(RELAY);
        exit;
    }

    # ---- NAT detection and fixing ----
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            # Only set received AVP — do NOT modify Contact header
            # (Asterisk rejects modified Contact from proxy with 420)
            fix_nated_register();
        } else {
            fix_nated_contact();
        }
        force_rport();
    }

    # ---- Sequential (in-dialog) requests ----
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE in-dialog: $fu -> $tu\n");
            }
            route(RELAY);
            exit;
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not Found");
            exit;
        }
    }

    # ---- Initial requests ----

    # Record-Route for INVITE and SUBSCRIBE
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # ---- REGISTER handling ----
    if (is_method("REGISTER")) {
        route(TENANT_LOOKUP);
        if ($avp(tenant_id) == $null) {
            xlog("L_WARN", "REGISTER rejected: unknown domain [$td]\n");
            sl_send_reply("403", "Unknown Tenant Domain");
            exit;
        }
        xlog("L_INFO", "REGISTER from [$fu] tenant=[$avp(tenant_id)] domain=[$td]\n");

        # Cross-tenant isolation: verify username belongs to this tenant.
        # SIP usernames follow the pattern {tenant_slug}_{ext}, e.g. "acme_101".
        # Reject if the username prefix doesn't match the resolved tenant slug.
        $var(expected_prefix) = $avp(tenant_id) + "_";
        $var(prefix_len) = $(var(expected_prefix){s.len});
        $var(user_prefix) = $(fU{s.substr,0,$var(prefix_len)});
        if ($var(user_prefix) != $var(expected_prefix)) {
            xlog("L_WARN", "REGISTER rejected: user [$fU] does not belong to tenant [$avp(tenant_id)]\n");
            sl_send_reply("403", "User-Tenant Mismatch");
            exit;
        }

        # Add Path header so Asterisk routes outbound calls through Kamailio
        add_path();

        # Strip RFC 5626 outbound artifacts from MicroSIP:
        # - Remove ";ob" from Contact URI (prevents Asterisk outbound validation)
        # - Remove Route header (outbound-proxy self-route, must not reach Asterisk)
        # - Remove Require/Proxy-Require (unsupported SIP extensions)
        subst('/;ob>/>/');
        remove_hf("Route");
        remove_hf("Require");
        remove_hf("Proxy-Require");

        # Asterisk's registrar_validate_path() requires "Supported: path"
        # when a Path header is present (RFC 3327). MicroSIP doesn't send it,
        # so we inject it here. Without this, Asterisk returns 420.
        remove_hf("Supported");
        append_hf("Supported: path\r\n");

        # Add tenant header and forward to Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");

        # Forward to Asterisk
        route(TO_ASTERISK);
        exit;
    }

    # ---- INVITE and other initial requests ----
    if (is_method("INVITE")) {
        route(TENANT_LOOKUP);
        if ($avp(tenant_id) == $null) {
            xlog("L_WARN", "INVITE rejected: unknown domain [$rd]\n");
            sl_send_reply("404", "Unknown Tenant Domain");
            exit;
        }
        xlog("L_INFO", "INVITE [$fu] -> [$ru] tenant=[$avp(tenant_id)]\n");

        # Add tenant header and forward to Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");

        route(TO_ASTERISK);
        exit;
    }

    # ---- Other methods (OPTIONS, etc.) ----
    if (is_method("OPTIONS")) {
        # Respond to OPTIONS pings (keepalive)
        sl_send_reply("200", "OK");
        exit;
    }

    # Default: forward to Asterisk
    route(TENANT_LOOKUP);
    if ($avp(tenant_id) != $null) {
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");
    }
    route(TO_ASTERISK);
    exit;
}

# ---- Tenant domain lookup ----
route[TENANT_LOOKUP] {
    # Extract domain from To-URI for REGISTER, Request-URI for others
    $var(lookup_domain) = $rd;
    if (is_method("REGISTER")) {
        $var(lookup_domain) = $td;
    }

    xlog("L_DBG", "Tenant lookup for domain: [$var(lookup_domain)]\n");

    # Lookup in htable
    $avp(tenant_id) = $sht(tenants=>$var(lookup_domain));
    if ($avp(tenant_id) == $null || $avp(tenant_id) == "") {
        $avp(tenant_id) = $null;
        xlog("L_WARN", "No tenant found for domain: [$var(lookup_domain)]\n");
    } else {
        xlog("L_INFO", "Resolved domain [$var(lookup_domain)] -> tenant [$avp(tenant_id)]\n");
    }
}

# ---- Pike flood protection + IP blacklist ----
route[PIKE_CHECK] {
    # Skip checks for Asterisk nodes (trusted internal — all on 127.0.0.1)
    if ($si == "127.0.0.1") {
        return;
    }

    # Check if IP is blacklisted
    if ($sht(ipblacklist=>$si) != $null && $sht(ipblacklist=>$si) != 0) {
        xlog("L_WARN", "Blocked blacklisted IP: $si\n");
        sl_send_reply("403", "Forbidden - IP Blacklisted");
        exit;
    }

    # Pike rate check
    if (!pike_check_req()) {
        # IP exceeded rate limit — add to blacklist (auto-expires in 1h)
        $sht(ipblacklist=>$si) = 1;
        xlog("L_ERR", "Pike flood detected from $si — blacklisted for 1h\n");
        sl_send_reply("403", "Forbidden - Rate Limit Exceeded");
        exit;
    }
}

# ---- Forward to Asterisk (via dispatcher) ----
route[TO_ASTERISK] {
    # Dispatcher algorithm 10 = hash by Call-ID (sticky per dialog).
    # Set 1 = Asterisk pool defined in dispatcher.list.
    # On failure, FAIL_ASTERISK route handles failover to next node.
    if (!ds_select_dst("1", "10")) {
        xlog("L_ERR", "No Asterisk node available in dispatcher pool!\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }
    xlog("L_INFO", "Dispatching to Asterisk: $du [$rm $ru]\n");
    t_on_failure("FAIL_ASTERISK");
    route(RELAY);
}

# ---- Generic relay ----
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# ---- Reply route ----
onreply_route {
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}

# ---- Failure route with dispatcher failover ----
failure_route[FAIL_ASTERISK] {
    if (t_is_canceled()) {
        exit;
    }

    # On 5xx or timeout — mark destination as probing and try next node
    if (t_check_status("5[0-9][0-9]") || t_branch_timeout()) {
        ds_mark_dst("ip");
        xlog("L_WARN", "Asterisk node $du failed ($T_reply_code) — trying next\n");
        if (ds_next_dst()) {
            t_on_failure("FAIL_ASTERISK");
            route(RELAY);
            exit;
        }
    }
    xlog("L_ERR", "All Asterisk nodes failed for [$rm $ru]: $T_reply_code $T_reply_reason\n");
}

# ---- Event route: startup — populate htable ----
event_route[htable:mod-init] {
    # Seed tenants (hardcoded). API adds new tenants dynamically via JSONRPC.
    $sht(tenants=>acme.pbx.local) = "acme";
    $sht(tenants=>globex.pbx.local) = "globex";
    $sht(tenants=>wayne.pbx.local) = "wayne";

    xlog("L_INFO", "Tenant htable initialized: acme.pbx.local, globex.pbx.local, wayne.pbx.local\n");
}
