#!KAMAILIO
#
# PBX Cloud - Multi-Tenant SIP Proxy Configuration
# Kamailio 5.7 - Edge proxy with tenant routing
#

####### Global Parameters #########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0

memdbg=5
memlog=5

children=4
auto_aliases=no
alias=127.0.0.1
alias=localhost
alias=${EXTERNAL_IP}
enable_tls=yes
tcp_accept_no_cl=yes

# Listen on UDP port 5060 (edge SIP port)
listen=udp:0.0.0.0:5060 advertise ${EXTERNAL_IP}:5060

# Listen on TLS port 5061 (SIP over TLS)
listen=tls:0.0.0.0:5061 advertise ${EXTERNAL_IP}:5061

# Listen on WSS port 8443 (WebRTC/WebSocket Secure — production)
listen=tls:0.0.0.0:8443 advertise ${EXTERNAL_IP}:8443

# Listen on WS port 8080 (WebSocket plain — development only)
listen=tcp:0.0.0.0:8080 advertise ${EXTERNAL_IP}:8080

####### Modules Section ########

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "usrloc.so"
loadmodule "nathelper.so"
loadmodule "htable.so"
loadmodule "path.so"
loadmodule "pike.so"
loadmodule "textopsx.so"
loadmodule "jsonrpcs.so"
loadmodule "tls.so"
loadmodule "dispatcher.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "rtpengine.so"

# ---- Module Parameters ----

# Transaction module
# fr_timer=5000 (5s) — fast timeout for passive dispatcher failover.
# When a node is down, failure_route triggers after 5s and tries next node.
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 120000)

# Record-Route
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# NAT helper — Kamailio is stateless proxy, no NAT keepalive needed
# (Asterisk handles registrations and keepalive via qualify_frequency)
modparam("nathelper", "received_avp", "$avp(received)")

# usrloc — memory-only mode (Asterisk handles registrations, not Kamailio)
modparam("usrloc", "db_mode", 0)

# Pike — flood protection
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# TLS — SIP over TLS on port 5061 (self-signed cert)
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# htable — tenant domain lookup table
# Format: key = SIP domain, value = tenant slug
# Populated on startup via event_route[htable:mod-init] and dynamically via JSONRPC
modparam("htable", "htable", "tenants=>size=4;")

# htable — IP blacklist (auto-expire after 3600 seconds = 1 hour)
# Pike-detected flood sources are added here automatically
modparam("htable", "htable", "ipblacklist=>size=8;autoexpire=3600;initval=0;")

# htable — Global IP whitelist (immune from pike/blacklist, no expiry)
# Managed by super_admin via API, synced via JSONRPC on startup
modparam("htable", "htable", "ipwhitelist=>size=8;")

# htable — Tenant IP ACL (per-tenant strict whitelist)
# Key format: "slug::ip" = 1 (allowed), "slug::*" = 1 (ACL enabled marker)
# Synced from DB via API JSONRPC on startup and on every ACL change
modparam("htable", "htable", "tenant_acl=>size=8;")

# JSONRPC — DATAGRAM (UDP) transport for API management
# Per docs: 1=HTTP, 2=FIFO, 4=DATAGRAM, 8=TCP
modparam("jsonrpcs", "transport", 4)
modparam("jsonrpcs", "dgram_socket", "udp:127.0.0.1:9090")

# Dispatcher — Asterisk pool load balancing (Phase 5)
# File-based destination list; flags=2 enables failover via XAVP storage.
# Algorithm 10 = hash by Call-ID (sticky sessions per dialog).
#
# Failover strategy: ACTIVE PROBING
# Pings Asterisk nodes every 5s. If a node fails, it's marked inactive.
# Continuous probing allows automatic recovery when it comes back online.
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_from", "sip:proxy@pbx.local")
modparam("dispatcher", "ds_probing_threshold", 2)
modparam("dispatcher", "ds_inactive_threshold", 2)
modparam("dispatcher", "ds_timer_mode", 1)
modparam("dispatcher", "ds_ping_latency_stats", 1)
# Accept 2xx + specific 4xx as "node is alive".
# WARNING: class=4 is unsafe — Kamailio generates 408 internally on timeout,
# which would make dead nodes appear alive. Use explicit safe codes instead.
# Asterisk will likely respond to unauthenticated OPTIONS with 401 Unauthorized.
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=400;code=401;code=403;code=404;code=405")

# rtpengine — media proxy for WebRTC ↔ SIP bridging
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")

####### Routing Logic ########

# Main request route
request_route {

    # ---- Pike flood protection + IP blacklist ----
    route(PIKE_CHECK);

    # ---- Per-request initial checks ----
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Sanity check
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # ---- Anti-loop: detect requests from Asterisk nodes ----
    # If the request comes from an Asterisk node, let it through
    # without re-processing tenant logic. Asterisk B2BUA sends NEW INVITEs
    # with Route headers (from Path) — loose_route() processes them.
    # Check both Asterisk ports (5070 for node1, 5072 for node2).
    if (($sp == 5070 || $sp == 5072) && ($si == "127.0.0.1" || $si == $env(EXTERNAL_IP))) {
        xlog("L_INFO", "Request from Asterisk [$si:$sp] [$rm $ru] — forwarding outbound\n");
        if (is_method("INVITE|SUBSCRIBE")) {
            record_route();
        }
        # Process Route headers (from Path-based routing)
        if (loose_route()) {
            xlog("L_INFO", "Asterisk outbound via loose_route to $du\n");
            route(RELAY);
            exit;
        }
        route(RELAY);
        exit;
    }

    # ---- NAT detection and fixing ----
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            # Only set received AVP — do NOT modify Contact header
            # (Asterisk rejects modified Contact from proxy with 420)
            fix_nated_register();
        } else {
            fix_nated_contact();
        }
        force_rport();
    }

    # ---- Sequential (in-dialog) requests ----
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE in-dialog: $fu -> $tu\n");
            }
            route(RELAY);
            exit;
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not Found");
            exit;
        }
    }

    # ---- Initial requests ----

    # Record-Route for INVITE and SUBSCRIBE
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # ---- REGISTER handling ----
    if (is_method("REGISTER")) {
        route(TENANT_LOOKUP);
        if ($avp(tenant_id) == $null) {
            xlog("L_WARN", "REGISTER rejected: unknown domain [$td]\n");
            sl_send_reply("403", "Unknown Tenant Domain");
            exit;
        }
        xlog("L_INFO", "REGISTER from [$fu] tenant=[$avp(tenant_id)] domain=[$td]\n");

        # Cross-tenant isolation: verify username belongs to this tenant.
        # SIP usernames follow the pattern {tenant_slug}_{ext}, e.g. "acme_101".
        # Reject if the username prefix doesn't match the resolved tenant slug.
        $var(expected_prefix) = $avp(tenant_id) + "_";
        $var(prefix_len) = $(var(expected_prefix){s.len});
        $var(user_prefix) = $(fU{s.substr,0,$var(prefix_len)});
        if ($var(user_prefix) != $var(expected_prefix)) {
            xlog("L_WARN", "REGISTER rejected: user [$fU] does not belong to tenant [$avp(tenant_id)]\n");
            sl_send_reply("403", "User-Tenant Mismatch");
            exit;
        }

        # Add Path header so Asterisk routes outbound calls through Kamailio.
        # WebSocket clients need special handling:
        #   - Path URI must use UDP port 5060 (Asterisk can only reach UDP)
        #   - received= param carries the actual WS source address
        #   - loose_route() will set $du from received= for B-leg routing
        if ($proto =~ "ws") {
            $var(ws_rcv) = "sip:" + $si + ":" + $sp + ";transport=ws";
            append_hf("Path: <sip:$env(EXTERNAL_IP):5060;lr;received=$var(ws_rcv)>\r\n");
            xlog("L_INFO", "WebSocket REGISTER: Path received=$var(ws_rcv)\n");
        } else {
            add_path_received();
        }

        # Strip RFC 5626 outbound artifacts from MicroSIP:
        # - Remove ";ob" from Contact URI (prevents Asterisk outbound validation)
        # - Remove Route header (outbound-proxy self-route, must not reach Asterisk)
        # - Remove Require/Proxy-Require (unsupported SIP extensions)
        subst('/;ob>/>/');
        remove_hf("Route");
        remove_hf("Require");
        remove_hf("Proxy-Require");

        # Asterisk's registrar_validate_path() requires "Supported: path"
        # when a Path header is present (RFC 3327). MicroSIP doesn't send it,
        # so we inject it here. Without this, Asterisk returns 420.
        remove_hf("Supported");
        append_hf("Supported: path\r\n");

        # Add tenant header and forward to Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");

        # Tenant IP ACL — strict whitelist enforcement
        # If tenant has ACL enabled (marker key exists), reject IPs not in list
        $var(acl_marker) = $avp(tenant_id) + "::*";
        if ($sht(tenant_acl=>$var(acl_marker)) != $null) {
            $var(acl_key) = $avp(tenant_id) + "::" + $si;
            if ($sht(tenant_acl=>$var(acl_key)) == $null) {
                xlog("L_WARN", "REGISTER rejected: IP $si not in ACL for tenant $avp(tenant_id)\n");
                sl_send_reply("403", "IP Not Authorized for Tenant");
                exit;
            }
            xlog("L_INFO", "REGISTER from ACL-approved IP $si for tenant $avp(tenant_id)\n");
        }

        # Forward to Asterisk
        route(TO_ASTERISK);
        exit;
    }

    # ---- INVITE and other initial requests ----
    if (is_method("INVITE")) {
        route(TENANT_LOOKUP);
        if ($avp(tenant_id) == $null) {
            xlog("L_WARN", "INVITE rejected: unknown domain [$rd]\n");
            sl_send_reply("404", "Unknown Tenant Domain");
            exit;
        }
        xlog("L_INFO", "INVITE [$fu] -> [$ru] tenant=[$avp(tenant_id)]\n");

        # Add tenant header and forward to Asterisk
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");

        route(TO_ASTERISK);
        exit;
    }

    # ---- Other methods (OPTIONS, etc.) ----
    if (is_method("OPTIONS")) {
        # Respond to OPTIONS pings (keepalive)
        sl_send_reply("200", "OK");
        exit;
    }

    # Default: forward to Asterisk
    route(TENANT_LOOKUP);
    if ($avp(tenant_id) != $null) {
        remove_hf("X-Tenant-ID");
        append_hf("X-Tenant-ID: $avp(tenant_id)\r\n");
    }
    route(TO_ASTERISK);
    exit;
}

# ---- Tenant domain lookup ----
route[TENANT_LOOKUP] {
    # Extract domain from To-URI for REGISTER, Request-URI for others
    $var(lookup_domain) = $rd;
    if (is_method("REGISTER")) {
        $var(lookup_domain) = $td;
    }

    xlog("L_DBG", "Tenant lookup for domain: [$var(lookup_domain)]\n");

    # Lookup in htable
    $avp(tenant_id) = $sht(tenants=>$var(lookup_domain));
    if ($avp(tenant_id) == $null || $avp(tenant_id) == "") {
        $avp(tenant_id) = $null;
        xlog("L_WARN", "No tenant found for domain: [$var(lookup_domain)]\n");
    } else {
        xlog("L_INFO", "Resolved domain [$var(lookup_domain)] -> tenant [$avp(tenant_id)]\n");
    }
}

# ---- Pike flood protection + IP whitelist/blacklist ----
route[PIKE_CHECK] {
    # Skip checks for Asterisk nodes (trusted internal)
    if ($si == "127.0.0.1" || $si == $env(EXTERNAL_IP)) {
        return;
    }

    # Global whitelist — immune from pike and blacklist
    if ($sht(ipwhitelist=>$si) != $null && $sht(ipwhitelist=>$si) != 0) {
        xlog("L_DBG", "Whitelisted IP $si — skipping pike/blacklist\n");
        return;
    }

    # Check if IP is blacklisted
    if ($sht(ipblacklist=>$si) != $null && $sht(ipblacklist=>$si) != 0) {
        xlog("L_WARN", "Blocked blacklisted IP: $si\n");
        sl_send_reply("403", "Forbidden - IP Blacklisted");
        exit;
    }

    # Pike rate check
    if (!pike_check_req()) {
        # IP exceeded rate limit — add to blacklist (auto-expires in 1h)
        $sht(ipblacklist=>$si) = 1;
        xlog("L_ERR", "Pike flood detected from $si — blacklisted for 1h\n");
        sl_send_reply("403", "Forbidden - Rate Limit Exceeded");
        exit;
    }
}

# ---- Forward to Asterisk (via dispatcher) ----
route[TO_ASTERISK] {
    # Dispatcher algorithm 0 = hash by Call-ID (sticky per dialog).
    # Set 1 = Asterisk pool defined in dispatcher.list.
    # On failure, FAIL_ASTERISK route handles failover to next node.
    if (!ds_select_dst("1", "0")) {
        xlog("L_ERR", "No Asterisk node available in dispatcher pool!\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }
    xlog("L_INFO", "Dispatching to Asterisk: $du [$rm $ru]\n");
    t_on_failure("FAIL_ASTERISK");
    route(RELAY);
}

# ---- Generic relay ----
route[RELAY] {
    # Set branch and reply routes for rtpengine media management
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("branch_route")) {
            t_on_branch("MANAGE_BRANCH");
        }
    }
    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("onreply_route")) {
            t_on_reply("MANAGE_REPLY");
        }
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# ---- Reply route (global) ----
onreply_route {
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}

# ---- Failure route with dispatcher failover ----
failure_route[FAIL_ASTERISK] {
    if (t_is_canceled()) {
        exit;
    }

    # 401/407 = normal SIP auth challenge — NOT a failure, let TM handle it
    if (t_check_status("401|407")) {
        exit;
    }

    # On 5xx or timeout — mark destination as probing and try next node
    if (t_check_status("5[0-9][0-9]") || t_branch_timeout()) {
        ds_mark_dst("ip");
        xlog("L_WARN", "Asterisk node $du failed ($T_reply_code) — trying next\n");
        if (ds_next_dst()) {
            t_on_failure("FAIL_ASTERISK");
            route(RELAY);
            exit;
        }
    }
    xlog("L_ERR", "All Asterisk nodes failed for [$rm $ru]: $T_reply_code $T_reply_reason\n");
}

# ---- Event route: startup — populate htable ----
event_route[htable:mod-init] {
    # Seed tenants (hardcoded). API adds new tenants dynamically via JSONRPC.
    $sht(tenants=>acme.pbx.local) = "acme";
    $sht(tenants=>globex.pbx.local) = "globex";
    $sht(tenants=>wayne.pbx.local) = "wayne";
    $sht(tenants=>stark.pbx.local) = "stark";

    xlog("L_INFO", "Tenant htable initialized: acme, globex, wayne, stark\n");
}

# ---- Dispatcher event routes ----
event_route[dispatcher:dst-down] {
    xlog("L_ERR", "DISPATCHER: destination DOWN: $rm $ru ($du)\n");
}

event_route[dispatcher:dst-up] {
    xlog("L_INFO", "DISPATCHER: destination UP: $rm $ru ($du)\n");
}

# ---- WebSocket / WebRTC support ----
# Handles HTTP→WebSocket upgrade for SIP over WSS (port 8443)
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    if ($hdr(Upgrade) =~ "websocket"
        && $hdr(Connection) =~ "Upgrade"
        && $rm =~ "GET") {
        # WebSocket handshake
        if (ws_handle_handshake()) {
            exit;
        }
    }

    xhttp_reply("404", "Not Found", "text/html", "<html><body>Not found</body></html>");
    exit;
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed from $si:$sp\n");
}

# ---- Detect WebRTC <-> SIP bridging need ----
route[BRIDGING] {
    if (!has_totag()) {
        if ($proto =~ "ws" && !($ru =~ "transport=ws")) {
            # WebSocket -> non-WebSocket: needs media bridging
            setbflag(11);
        } else if (!($proto =~ "ws") && $ru =~ "transport=ws") {
            # non-WebSocket -> WebSocket: needs media bridging
            setbflag(11);
        }
    }
}

# ---- Branch route: handle offer SDP via rtpengine ----
branch_route[MANAGE_BRANCH] {
    xlog("L_WARN", "MANAGE_BRANCH: branch [$T_branch_idx] to $ru proto=$proto\n");
    route(BRIDGING);

    if (is_method("INVITE") && $hdr(Authorization) == $null && $hdr(Proxy-Authorization) == $null) {
        # Do NOT skip rtpengine if the call is initiated by Asterisk (outbound B-leg)
        if ($sp != 5070 && $sp != 5072) {
            if ($si != "127.0.0.1" && $si != $env(EXTERNAL_IP)) {
                xlog("L_WARN", "MANAGE_BRANCH: skipping rtpengine — no auth header [Call-ID=$ci]\n");
                return;
            }
        }
    }


    route(NATMANAGE);
}

# ---- Named reply route: handle answer SDP via rtpengine ----
onreply_route[MANAGE_REPLY] {
    xlog("L_INFO", "MANAGE_REPLY: status=$rs proto=$proto bflag11=$bf\n");
    if (status =~ "[12][0-9][0-9]") {
        route(NATMANAGE);
    }
}

# ---- NAT and media management via rtpengine ----
# Uses $proto to auto-detect direction:
#   - In branch_route: $proto = original request protocol (WS for WebRTC)
#   - In onreply_route: $proto = reply protocol (UDP from Asterisk)
# Uses branch flag 11 to mark calls needing WebRTC <-> SIP bridging
route[NATMANAGE] {
    if (!has_body("application/sdp")) {
        return;
    }

    if (!isbflagset(11)) {
        # No bridging needed — still use rtpengine for NAT
        rtpengine_manage("replace-origin replace-session-connection");
        return;
    }

    if ($proto =~ "ws") {
        # Web -> SIP direction: strip WebRTC features for Asterisk.
        # RTP/AVP implies no DTLS/SRTP — do NOT explicitly set DTLS=off
        # as that can kill the DTLS state for the browser-facing side.
        xlog("L_WARN", "NATMANAGE: Web -> SIP [Call-ID=$ci]\n");
        rtpengine_manage("trust-address replace-origin replace-session-connection rtcp-mux-demux ICE=remove RTP/AVP");
    } else {
        # SIP -> Web direction: add WebRTC features for browser.
        # DTLS=active = rtpengine initiates DTLS handshake (RFC 4145: answerer SHOULD be active).
        xlog("L_WARN", "NATMANAGE: SIP -> Web [Call-ID=$ci]\n");
        rtpengine_manage("trust-address replace-origin replace-session-connection rtcp-mux-offer ICE=force DTLS=active RTP/SAVPF");
    }
}
