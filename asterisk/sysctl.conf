# PBX Cloud — Linux Kernel Tuning (Host-Level)
#
# Apply these sysctl settings on the Docker HOST for production deployment.
# These settings optimize network buffers for high-throughput SIP/RTP traffic.
#
# Apply: sudo sysctl -p /path/to/sysctl.conf
# Or add to /etc/sysctl.d/99-pbx-cloud.conf
#

# ---- Network buffer sizes (for SIP + RTP traffic) ----
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# ---- UDP memory ----
net.ipv4.udp_mem = 65536 131072 262144
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384

# ---- Connection tracking (for NAT traversal) ----
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 60
net.netfilter.nf_conntrack_udp_timeout_stream = 180

# ---- Increase local port range (for RTP) ----
net.ipv4.ip_local_port_range = 10000 65535

# ---- Reduce TIME_WAIT for faster port recycling ----
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
