;
; PBX Cloud - Asterisk Manager Interface (AMI) Configuration
;
; Enables the API service to query active calls and manage Asterisk.
; This user is restricted to localhost only for security.
;

[general]
enabled = yes
port = ${AMI_PORT}
bindaddr = 127.0.0.1

[pbx_api]
secret = amipass123
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.0
read = system,call,cdr,agent
write = system,call,originate
