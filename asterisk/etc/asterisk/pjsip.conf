;
; PBX Cloud - PJSIP Configuration (Multi-Tenant)
;
; Endpoints are loaded from PostgreSQL via ARA (sorcery.conf + extconfig.conf).
; Only transport definition lives in this file.
;
; SIP Flow:
;   Client -> Kamailio:5060 -> Asterisk:5070
;   Kamailio adds X-Tenant-ID header before forwarding.
;   All ARA endpoints have context=from-kamailio, which reads
;   X-Tenant-ID and routes to the appropriate tenant context.
;

; --- Transport: UDP on port 5070 (internal) ---
; Kamailio handles port 5060 (edge). Asterisk listens on 5070.
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080
external_media_address=100.88.43.14
external_signaling_address=100.88.43.14

; Kamailio trunk - used by Asterisk to send calls back through Kamailio
[kamailio-trunk]
type=endpoint
transport=transport-udp
context=from-kamailio
aors=kamailio-trunk
allow=!all,ulaw,alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[kamailio-trunk]
type=aor
contact=sip:127.0.0.1:5060

[kamailio-trunk]
type=identify
endpoint=kamailio-trunk
match=127.0.0.1/32
