;
; PBX Cloud - PJSIP Configuration (Multi-Tenant)
;
; Endpoints are loaded from PostgreSQL via ARA (sorcery.conf + extconfig.conf).
; Only transport definition lives in this file.
;
; SIP Flow:
;   Client -> Kamailio:5060 -> Asterisk:5070
;   Kamailio adds X-Tenant-ID header before forwarding.
;   All ARA endpoints have context=from-kamailio, which reads
;   X-Tenant-ID and routes to the appropriate tenant context.
;

; --- Transport: UDP (port configured via env ASTERISK_SIP_PORT) ---
; Kamailio handles port 5060 (edge). Each Asterisk node listens on its own port.
; External access is blocked by iptables (see fail2ban/jail.local)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:${ASTERISK_SIP_PORT}
external_media_address=${EXTERNAL_IP}
external_signaling_address=${EXTERNAL_IP}

; --- Global PJSIP settings (Phase 5 tuning) ---
[global]
type=global
max_initial_qualify_time=4
keep_alive_interval=30
max_forwards=70
user_agent=PBX-Cloud

; --- PJSIP threadpool tuning ---
; Optimized for handling 200 concurrent calls per node
[system]
type=system
timer_t1=500
timer_b=32000
compact_headers=no
threadpool_initial_size=10
threadpool_auto_increment=5
threadpool_idle_timeout=60
threadpool_max_size=50
