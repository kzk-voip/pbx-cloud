;
; PBX Cloud - PJSIP Configuration (Multi-Tenant)
;
; Endpoints are loaded from PostgreSQL via ARA (sorcery.conf + extconfig.conf).
; Only transport definition lives in this file.
;
; SIP Flow:
;   Client -> Kamailio:5060 -> Asterisk:5070
;   Kamailio adds X-Tenant-ID header before forwarding.
;   All ARA endpoints have context=from-kamailio, which reads
;   X-Tenant-ID and routes to the appropriate tenant context.
;

; --- Transport: UDP on port 5070 (internal) ---
; Kamailio handles port 5060 (edge). Asterisk listens on 5070.
[transport-udp]
type=transport
protocol=udp
bind=127.0.0.1:5070
external_media_address=${EXTERNAL_IP}
external_signaling_address=${EXTERNAL_IP}
