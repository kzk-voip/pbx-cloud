[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080

; Kamailio trunk - used by Asterisk to send calls back through Kamailio
; Kamailio looks up the destination in usrloc and routes to the real SIP client
[kamailio-trunk]
type=endpoint
transport=transport-udp
context=from-kamailio
aors=kamailio-trunk
allow=!all,ulaw,alaw

[kamailio-trunk]
type=aor
contact=sip:127.0.0.1:5060

[kamailio-trunk]
type=identify
endpoint=kamailio-trunk
match=127.0.0.1/32