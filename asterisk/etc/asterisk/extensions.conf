;
; PBX Cloud - Multi-Tenant Dialplan
;
; Incoming calls from Kamailio land in [from-kamailio] context.
; The X-Tenant-ID header (set by Kamailio) determines the tenant context.
; Each tenant has an isolated context: [tenant_{slug}]
;

; =============================================
; Entry point for all SIP traffic from Kamailio
; =============================================
[from-kamailio]
; Read X-Tenant-ID from SIP header
exten => _X.,1,NoOp(=== Incoming call from Kamailio ===)
 same => n,Set(TENANT_ID=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,NoOp(Tenant: ${TENANT_ID}, Calling: ${EXTEN})
 same => n,GotoIf($["${TENANT_ID}" = "acme"]?tenant_acme,${EXTEN},1)
 same => n,GotoIf($["${TENANT_ID}" = "globex"]?tenant_globex,${EXTEN},1)
 same => n,NoOp(Unknown tenant: ${TENANT_ID})
 same => n,Hangup(21) ; AST_CAUSE_CALL_REJECTED

; =============================================
; Tenant: Acme Corporation
; =============================================
[tenant_acme]
; --- Internal calls (3-digit extensions) ---
exten => _XXX,1,NoOp(Acme internal call to ${EXTEN})
 same => n,Dial(PJSIP/acme_${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(acme_${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(acme_${EXTEN}@default,u)
 same => n,Hangup()

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(acme_${CALLERID(num)}@default)

; --- Echo test ---
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; =============================================
; Tenant: Globex Inc
; =============================================
[tenant_globex]
; --- Internal calls (3-digit extensions) ---
exten => _XXX,1,NoOp(Globex internal call to ${EXTEN})
 same => n,Dial(PJSIP/globex_${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(globex_${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(globex_${EXTEN}@default,u)
 same => n,Hangup()

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(globex_${CALLERID(num)}@default)

; --- Echo test ---
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; =============================================
; IVR (shared, can be routed to from any tenant)
; =============================================
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(from-kamailio,101,1)
exten => 2,1,Goto(from-kamailio,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()