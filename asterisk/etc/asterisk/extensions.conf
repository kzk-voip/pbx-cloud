; ==========================================================
; Dialplan — Multi-tenant PBX
; ==========================================================
; Entry point: [from-kamailio]
; Kamailio adds X-Tenant-ID header and rewrites the user part
; to {prefix}_{ext} (e.g., t1_101). This context extracts the
; tenant ID and routes to the appropriate tenant context.

; --- Entry point from Kamailio ---
[from-kamailio]
; Read X-Tenant-ID header set by Kamailio
exten => _X.,1,NoOp(== Incoming call from Kamailio ==)
 same => n,Set(TENANT_ID=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,NoOp(Tenant ID: ${TENANT_ID}, Dialed: ${EXTEN})
 same => n,GotoIf($["${TENANT_ID}" != ""]?tenant_${TENANT_ID},${EXTEN},1)
 same => n,NoOp(ERROR: No X-Tenant-ID header found)
 same => n,Congestion(5)
 same => n,Hangup()

; --- Tenant 1 context (Acme Corp) ---
[tenant_1]
; Internal calls: 3-digit extension (e.g., 101 → t1_101)
exten => _XXX,1,NoOp(Tenant 1 — calling ${EXTEN})
 same => n,Set(TARGET=t1_${EXTEN})
 same => n,Dial(PJSIP/${TARGET},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${TARGET}@tenant_1,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${TARGET}@tenant_1,u)
 same => n,Hangup()

; Voicemail access
exten => *97,1,VoiceMailMain(t1_${CALLERID(num)}@tenant_1)

; Echo test
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- Tenant 2 context (Globex Inc) ---
[tenant_2]
; Internal calls: 3-digit extension (e.g., 101 → t2_101)
exten => _XXX,1,NoOp(Tenant 2 — calling ${EXTEN})
 same => n,Set(TARGET=t2_${EXTEN})
 same => n,Dial(PJSIP/${TARGET},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${TARGET}@tenant_2,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${TARGET}@tenant_2,u)
 same => n,Hangup()

; Voicemail access
exten => *97,1,VoiceMailMain(t2_${CALLERID(num)}@tenant_2)

; Echo test
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- IVR (generic, can be per-tenant later) ---
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(from-kamailio,101,1)
exten => 2,1,Goto(from-kamailio,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()