; ============================================================
; Global context (legacy single-tenant, echo test, voicemail)
; ============================================================
[internal]
exten => _XXX,1,NoOp(Calling ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${EXTEN}@default,u)
 same => n,Hangup()

exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ============================================================
; Per-tenant contexts
; Endpoints use context=tenant_{id}, dialplan prefixes tenant_id
; to the dialed number: 102 -> t1_102 (within tenant t1)
; ============================================================

[tenant_t1]
exten => _XXX,1,NoOp(Tenant t1: ${CALLERID(num)} calling ${EXTEN})
 same => n,Dial(PJSIP/t1_${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(t1_${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(t1_${EXTEN}@default,u)
 same => n,Hangup()

exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

[tenant_t2]
exten => _XXX,1,NoOp(Tenant t2: ${CALLERID(num)} calling ${EXTEN})
 same => n,Dial(PJSIP/t2_${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(t2_${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(t2_${EXTEN}@default,u)
 same => n,Hangup()

exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ============================================================
; IVR (demo, not bound to inbound yet)
; ============================================================
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(internal,101,1)
exten => 2,1,Goto(internal,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()