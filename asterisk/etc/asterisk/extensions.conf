; ============================================================
; Dynamic tenant context (receives traffic from Kamailio)
; Kamailio adds X-Tenant-ID header, Asterisk uses it to
; prefix the dialed number with tenant_id
; ============================================================

[from-kamailio]
exten => _XXX,1,NoOp(From Kamailio: user=${CALLERID(num)} ext=${EXTEN})
 same => n,Set(TENANT=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,GotoIf($["${TENANT}" = ""]?notenant)
 same => n,NoOp(Tenant=${TENANT} dialing ${TENANT}_${EXTEN})
 same => n,Dial(PJSIP/${TENANT}_${EXTEN}@kamailio-trunk,30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${TENANT}_${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${TENANT}_${EXTEN}@default,u)
 same => n,Hangup()
 same => n(notenant),Log(WARNING,No X-Tenant-ID header found)
 same => n,Hangup()

exten => *97,1,Set(TENANT=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,VoiceMailMain(${CALLERID(num)}@default)

exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ============================================================
; Legacy direct context (for backward compatibility / testing)
; ============================================================

[internal]
exten => _XXX,1,NoOp(Direct call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${EXTEN}@default,u)
 same => n,Hangup()

exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ============================================================
; IVR (demo, not bound to inbound yet)
; ============================================================
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(internal,101,1)
exten => 2,1,Goto(internal,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()