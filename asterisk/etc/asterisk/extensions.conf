;
; PBX Cloud - Multi-Tenant Dialplan
;
; Incoming calls from Kamailio land in [from-kamailio] context.
; The X-Tenant-ID header (set by Kamailio) determines the tenant context.
; Each tenant has an isolated context: [tenant_{slug}]
;
; DYNAMIC ROUTING: adding a new tenant requires only:
;   1) INSERT rows into PostgreSQL (tenants + ps_endpoints/auths/aors)
;   2) Add domain to Kamailio htable
;   3) Add [tenant_{slug}] context below
;

; =============================================
; Entry point for all SIP traffic from Kamailio
; =============================================
[from-kamailio]
; Read X-Tenant-ID from SIP header and route dynamically
exten => _X.,1,NoOp(=== Incoming call from Kamailio ===)
 same => n,Set(TENANT_ID=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,NoOp(Tenant: ${TENANT_ID}, Calling: ${EXTEN})
 same => n,GotoIf($["${TENANT_ID}" = ""]?no_tenant)
 same => n,Goto(tenant_${TENANT_ID},${EXTEN},1)
 same => n(no_tenant),NoOp(No tenant ID received — rejecting)
 same => n,Hangup(21) ; AST_CAUSE_CALL_REJECTED

; Catch invalid extension within from-kamailio (fallback)
exten => _X.,1(invalid),Hangup(21)

; =============================================
; Tenant: Acme Corporation (acme.pbx.local)
; Extensions: 101, 102
; =============================================
[tenant_acme]
; --- Internal calls (3-digit extensions) ---
exten => _XXX,1,NoOp(Acme internal call to ${EXTEN})
 same => n,Set(CDR(accountcode)=acme)
 same => n,Set(GROUP(tenant)=acme)
 same => n,GotoIf($[${GROUP_COUNT(acme@tenant)} > 5]?limit)
 same => n,Dial(PJSIP/acme_${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(acme_${EXTEN}@acme,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(acme_${EXTEN}@acme,u)
 same => n,Hangup()
 same => n(limit),Playback(all-circuits-busy-now)
 same => n,Hangup(34) ; AST_CAUSE_CONGESTION

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(acme_${CALLERID(num)}@acme)

; --- Echo test ---
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- Catch-all: reject unknown extensions ---
exten => _X.,1,NoOp(Acme: unknown extension ${EXTEN} — rejecting)
 same => n,Playback(number-not-in-db)
 same => n,Hangup(1) ; AST_CAUSE_UNALLOCATED

