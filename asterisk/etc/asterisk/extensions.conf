; =============================================================
; extensions.conf — Multi-tenant dialplan
; =============================================================
; All tenant endpoints use context=tenant-internal (set in ps_endpoints).
; Tenant isolation is enforced by:
;   1. Kamailio (cross-tenant INVITE rejected before reaching Asterisk)
;   2. Asterisk dialplan (TENANT_ID channel variable check below)
;
; The TENANT_ID channel variable is set via ps_endpoints.set_var column
; (e.g., set_var=TENANT_ID=1). This is populated when the channel is created.
; =============================================================

[tenant-internal]
; --- Dynamic routing: any 3-digit extension ---
exten => _XXX,1,NoOp(Tenant ${TENANT_ID}: ${CALLERID(num)} calling ${EXTEN})
 same => n,Set(MY_TENANT=${TENANT_ID})
 ; --- Defense-in-depth: read X-Tenant-ID from SIP header (set by Kamailio) ---
 same => n,Set(SIP_TENANT=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,ExecIf($["${SIP_TENANT}" != "" & "${MY_TENANT}" != "${SIP_TENANT}"]?Goto(hdr_mismatch))
 ; Look up the target endpoint's tenant via REALTIME
 same => n,Set(TARGET_TENANT=${REALTIME_FIELD(ps_endpoints,id,${EXTEN},tenant_id)})
 same => n,NoOp(My tenant=${MY_TENANT}, Target tenant=${TARGET_TENANT}, SIP header tenant=${SIP_TENANT})
 ; Tenant isolation: reject if different tenants
 same => n,GotoIf($["${MY_TENANT}" = ""]?deny)
 same => n,GotoIf($["${TARGET_TENANT}" = ""]?not_found)
 same => n,GotoIf($["${MY_TENANT}" != "${TARGET_TENANT}"]?deny)
 ; Same tenant — proceed with call
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${EXTEN}@default,b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${EXTEN}@default,u)
 same => n,Hangup()
 same => n(deny),NoOp(DENIED: Cross-tenant call attempt from ${CALLERID(num)} to ${EXTEN})
 same => n,Congestion(5)
 same => n,Hangup()
 same => n(not_found),NoOp(NOT FOUND: Extension ${EXTEN} does not exist)
 same => n,Playback(number-not-in-service)
 same => n,Hangup()
 same => n(hdr_mismatch),NoOp(SECURITY: X-Tenant-ID header ${SIP_TENANT} != endpoint TENANT_ID ${MY_TENANT})
 same => n,Congestion(5)
 same => n,Hangup()

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

; --- Echo test (audio diagnostics) ---
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- IVR (kept but scoped to tenant) ---
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(tenant-internal,101,1)
exten => 2,1,Goto(tenant-internal,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()