;
; PBX Cloud - Multi-Tenant Dialplan (Dynamic)
;
; Incoming calls from Kamailio land in [from-kamailio] context.
; The X-Tenant-ID header (set by Kamailio) determines the tenant slug.
;
; FULLY DYNAMIC: adding a new tenant requires only:
;   1) INSERT rows into PostgreSQL (tenants + ps_endpoints/auths/aors)
;   2) Add domain to Kamailio htable (via API JSONRPC)
;   No dialplan changes needed — the dynamic context handles all tenants.
;

; =============================================
; Entry point for all SIP traffic from Kamailio
; =============================================
[from-kamailio]
; Read X-Tenant-ID from SIP header and route to dynamic tenant handler
exten => _.,1,NoOp(=== Incoming call from Kamailio ===)
 same => n,Set(__TENANT_ID=${PJSIP_HEADER(read,X-Tenant-ID)})
 same => n,NoOp(Tenant: ${TENANT_ID}, Calling: ${EXTEN})
 same => n,GotoIf($["${TENANT_ID}" != ""]?tenant_ok)

; B-leg fallback: no X-Tenant-ID header means this INVITE came back
; through Path routing (Asterisk → Kamailio → Asterisk).
; Extract tenant slug from the PJSIP endpoint name (e.g. "stark_401" → "stark").
 same => n,Set(EP_NAME=${CHANNEL(endpoint)})
 same => n,NoOp(B-leg detected: no X-Tenant-ID, endpoint=${EP_NAME})
 same => n,Set(__TENANT_ID=${CUT(EP_NAME,_,1)})
 same => n,GotoIf($["${TENANT_ID}" = ""]?no_tenant)
 same => n,NoOp(B-leg: extracted TENANT_ID=${TENANT_ID} from endpoint name)

 same => n(tenant_ok),NoOp(Tenant resolved: ${TENANT_ID})

; Query API for inbound rule routing
 same => n,Set(ROUTE_INFO=${CURL(http://127.0.0.1:8000/internal/inbound-lookup?slug=${TENANT_ID}&did=${EXTEN})})
 same => n,NoOp(Route lookup result: ${ROUTE_INFO})

; Parse route info (format: type:value)
 same => n,Set(ROUTE_TYPE=${CUT(ROUTE_INFO,:,1)})
 same => n,Set(ROUTE_VAL=${CUT(ROUTE_INFO,:,2)})

; Route call based on type
 same => n,GotoIf($["${ROUTE_TYPE}" = "extension"]?route-ext)
 same => n,GotoIf($["${ROUTE_TYPE}" = "voicemail"]?route-vm)
 same => n,GotoIf($["${ROUTE_TYPE}" = "ivr_menu"]?route-ivr)
 same => n,GotoIf($["${ROUTE_TYPE}" = "ring_group"]?route-rg)

; If no rule matched, fallback to normal tenant-dynamic routing
 same => n,Goto(tenant-dynamic,${EXTEN},1)

 same => n(route-ext),NoOp(Routing to extension ${ROUTE_VAL})
 same => n,Goto(tenant-dynamic,${ROUTE_VAL},1)

 same => n(route-vm),NoOp(Routing to voicemail ${ROUTE_VAL})
 same => n,Voicemail(${TENANT_ID}_${ROUTE_VAL}@${TENANT_ID},u)
 same => n,Hangup()

 same => n(route-ivr),NoOp(Routing to IVR menu ${ROUTE_VAL})
 same => n,Goto(ivr-main,s,1)

 same => n(route-rg),NoOp(Routing to Ring Group ${ROUTE_VAL})
 same => n,Goto(tenant-dynamic,${ROUTE_VAL},1)

 same => n(no_tenant),NoOp(No tenant ID received — rejecting)
 same => n,Hangup(21) ; AST_CAUSE_CALL_REJECTED



; =============================================
; Dynamic tenant context — handles ALL tenants
; Uses ${TENANT_ID} variable set in [from-kamailio]
; =============================================
[tenant-dynamic]

; --- Internal calls (3-digit extensions) ---
exten => _XXX,1,NoOp(${TENANT_ID}: internal call to ${EXTEN})
 same => n,Set(CDR(accountcode)=${TENANT_ID})
 same => n,Set(GROUP(tenant)=${TENANT_ID})
 same => n,Set(MAX_CALLS=${DB(tenant_limits/${TENANT_ID}/max_calls)})
 same => n,Set(MAX_CALLS=${IF($["${MAX_CALLS}" = ""]?5:${MAX_CALLS})})
 same => n,GotoIf($[${GROUP_COUNT(${TENANT_ID}@tenant)} > ${MAX_CALLS}]?limit)
 same => n,System(mkdir -p /var/spool/asterisk/recordings/${TENANT_ID} && chmod 777 /var/spool/asterisk/recordings/${TENANT_ID})
 same => n,MixMonitor(/var/spool/asterisk/recordings/${TENANT_ID}/${UNIQUEID}.wav,b)
 same => n,Dial(PJSIP/${TENANT_ID}_${EXTEN},30,tTkKb(add-tenant-hdr^s^1))
 same => n,StopMixMonitor()
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${TENANT_ID}_${EXTEN}@${TENANT_ID},b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${TENANT_ID}_${EXTEN}@${TENANT_ID},u)
 same => n,Hangup()
 same => n(limit),Playback(all-circuits-busy-now)
 same => n,Hangup(34) ; AST_CAUSE_CONGESTION

; --- 4-digit extensions ---
exten => _XXXX,1,NoOp(${TENANT_ID}: internal call to ${EXTEN})
 same => n,Set(CDR(accountcode)=${TENANT_ID})
 same => n,Set(GROUP(tenant)=${TENANT_ID})
 same => n,System(mkdir -p /var/spool/asterisk/recordings/${TENANT_ID} && chmod 777 /var/spool/asterisk/recordings/${TENANT_ID})
 same => n,MixMonitor(/var/spool/asterisk/recordings/${TENANT_ID}/${UNIQUEID}.wav,b)
 same => n,Dial(PJSIP/${TENANT_ID}_${EXTEN},30,tTkKb(add-tenant-hdr^s^1))
 same => n,StopMixMonitor()
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Voicemail(${TENANT_ID}_${EXTEN}@${TENANT_ID},b)
 same => n,Hangup()
 same => n(unavail),Voicemail(${TENANT_ID}_${EXTEN}@${TENANT_ID},u)
 same => n,Hangup()

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(${TENANT_ID}_${CALLERID(num)}@${TENANT_ID})

; --- Echo test ---
exten => *99,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; --- International call blocking (anti-fraud) ---
; Block international prefixes by default (00XX, 011X)
; TODO: check tenant.allow_international flag via ARA/Redis
exten => _00X.,1,Log(WARNING, ${TENANT_ID}: BLOCKED international call to ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(21) ; AST_CAUSE_CALL_REJECTED

exten => _011X.,1,Log(WARNING, ${TENANT_ID}: BLOCKED international call to ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(21) ; AST_CAUSE_CALL_REJECTED

; --- Catch-all / Outbound Routing lookup ---
exten => _X.,1,NoOp(${TENANT_ID}: Outbound route lookup for dialed number ${EXTEN})
 same => n,Set(ROUTE_INFO=${CURL(http://127.0.0.1:8000/internal/outbound-lookup?slug=${TENANT_ID}&number=${EXTEN})})
 same => n,NoOp(Outbound route result: ${ROUTE_INFO})
 same => n,GotoIf($["${ROUTE_INFO}" = "none"]?reject-call)

; Parse response: trunk_name:prefix_strip:prefix_add
 same => n,Set(TRUNK_NAME=${CUT(ROUTE_INFO,:,1)})
 same => n,Set(STRIP_COUNT=${CUT(ROUTE_INFO,:,2)})
 same => n,Set(PREPEND_VAL=${CUT(ROUTE_INFO,:,3)})

; Prepare dial string
 same => n,Set(DIALED_NUMBER=${EXTEN})
 same => n,Set(DIALED_NUMBER=${SUBSTR(DIALED_NUMBER,${STRIP_COUNT})})
 same => n,Set(DIALED_NUMBER=${PREPEND_VAL}${DIALED_NUMBER})
 same => n,NoOp(Dialing ${DIALED_NUMBER} via Trunk ${TRUNK_NAME})

; Check call limits / active call count for the tenant
 same => n,Set(GROUP(tenant)=${TENANT_ID})
 same => n,Set(MAX_CALLS=${DB(tenant_limits/${TENANT_ID}/max_calls)})
 same => n,Set(MAX_CALLS=${IF($["${MAX_CALLS}" = ""]?5:${MAX_CALLS})})
 same => n,GotoIf($[${GROUP_COUNT(${TENANT_ID}@tenant)} > ${MAX_CALLS}]?limit)

; Set CDR accountcode
 same => n,Set(CDR(accountcode)=${TENANT_ID})

; Record outbound call (only billable part)
 same => n,System(mkdir -p /var/spool/asterisk/recordings/${TENANT_ID} && chmod 777 /var/spool/asterisk/recordings/${TENANT_ID})
 same => n,MixMonitor(/var/spool/asterisk/recordings/${TENANT_ID}/${UNIQUEID}.wav,b)

; Dial out via trunk endpoint
 same => n,Dial(PJSIP/${DIALED_NUMBER}@${TRUNK_NAME},60,tT)
 same => n,StopMixMonitor()
 same => n,Hangup()

 same => n(limit),Playback(all-circuits-busy-now)
 same => n,Hangup(34) ; AST_CAUSE_CONGESTION

 same => n(reject-call),Log(WARNING, ${TENANT_ID}: no outbound route matched for ${EXTEN} — rejecting)
 same => n,Playback(number-not-in-db)
 same => n,Hangup(1) ; AST_CAUSE_UNALLOCATED

; =============================================
; Pre-dial handler: inject X-Tenant-ID into B-leg INVITE
; Called via b(add-tenant-hdr^s^1) in Dial() options.
; This ensures the B-leg INVITE carries the tenant header
; when it routes through Kamailio Path back to Asterisk.
; =============================================
[add-tenant-hdr]
exten => s,1,Set(PJSIP_HEADER(add,X-Tenant-ID)=${TENANT_ID})
 same => n,Return()

; =============================================
; IVR (shared, can be routed to from any tenant)
; =============================================
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(from-kamailio,101,1)
exten => 2,1,Goto(from-kamailio,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()