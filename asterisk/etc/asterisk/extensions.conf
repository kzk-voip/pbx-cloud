[internal]
; --- Dynamic routing: any 3-digit extension ---
exten => _XXX,1,NoOp(Calling ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(busy),Playback(vm-is-busy)
 same => n,Hangup()
 same => n(unavail),Voicemail(${EXTEN}@default,u)
 same => n,Hangup()

; --- Voicemail access ---
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

; --- Echo test (audio diagnostics) ---
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

[ivr-main]
exten => s,1,Answer()
 same => n,Playback(welcome)
 same => n(menu),Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Goto(internal,101,1)
exten => 2,1,Goto(internal,102,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(goodbye)
 same => n,Hangup()