;
; PBX Cloud - Asterisk Global Configuration
;
; Phase 5: Performance tuning for scaling
;

[directories]
; Config files are processed per-node into /tmp/asterisk-conf by entrypoint
; (avoids race condition when both nodes share the same bind-mounted configs)
astetcdir => /tmp/asterisk-conf

[options]
; Maximum simultaneous calls (per node)
maxcalls = 200

; Maximum system load average before rejecting new calls
; Prevents call quality degradation under heavy load
maxload = 4.0

; Cache ARA realtime objects (reduces DB queries)
cache_record_files = yes
record_cache_dir = /tmp/asterisk_record_cache

[files]
astctlpermissions = 0660
astctlowner = root
astctlgroup = asterisk

[compat]
pbx_realtime = 1.6
res_agi = 1.6
app_set = 1.6
