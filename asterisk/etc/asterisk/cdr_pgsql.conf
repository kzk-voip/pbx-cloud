;
; CDR PostgreSQL Backend
;
; Writes Call Detail Records directly to PostgreSQL.
; Tenant identification is via accountcode field (set in dialplan).
; A PostgreSQL trigger auto-populates tenant_id from accountcode.
;

[global]
hostname=127.0.0.1
port=6432
dbname=pbx
user=pbx_user
password=${POSTGRES_PASSWORD}
table=cdr
encoding=UTF8
