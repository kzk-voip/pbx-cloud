groups:
  - name: PBX_Alerts
    rules:
      - alert: ApiHighErrorRate
        expr: sum(rate(fastapi_responses_total{status=~"5.."}[5m])) / sum(rate(fastapi_responses_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API Error rate is > 5%"
          description: "High rate of HTTP 5xx responses from FastAPI."

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections running high"
          description: "Active connections exceed 80."
